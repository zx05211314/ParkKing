name: Render Runtime Env Sync

on:
  workflow_dispatch:
    inputs:
      serviceId:
        description: Render service ID, for example srv-...
        required: false
      serviceName:
        description: Render service name to resolve when serviceId is omitted
        required: false
        default: parkking
      packageUrl:
        description: Optional PARKKING_RELEASE_PACKAGE_URL to sync with runtime env
        required: false
      manifestUrl:
        description: Optional PARKKING_RELEASE_MANIFEST_URL to sync with runtime env
        required: false
      execute:
        description: Actually update Render env vars; false runs a dry-run plan
        required: false
        type: boolean
        default: false
      deploy:
        description: Trigger a Render deploy after updating runtime env vars
        required: false
        type: boolean
        default: true
      deployMode:
        description: Render deploy mode
        required: false
        type: choice
        default: build_and_deploy
        options:
          - build_and_deploy
          - deploy_only
  workflow_run:
    workflows:
      - Release Data Package
    types:
      - completed

permissions:
  contents: read

jobs:
  sync:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'data-')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Sync Render runtime env
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          PARKKING_RENDER_SERVICE_ID: ${{ secrets.PARKKING_RENDER_SERVICE_ID }}
          PARKKING_RENDER_SERVICE_NAME: ${{ secrets.PARKKING_RENDER_SERVICE_NAME }}
          PARKKING_WORKFLOW_EVENT_NAME: ${{ github.event_name }}
          PARKKING_WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          PARKKING_INPUT_SERVICE_ID: ${{ github.event.inputs.serviceId }}
          PARKKING_INPUT_SERVICE_NAME: ${{ github.event.inputs.serviceName }}
          PARKKING_INPUT_PACKAGE_URL: ${{ github.event.inputs.packageUrl }}
          PARKKING_INPUT_MANIFEST_URL: ${{ github.event.inputs.manifestUrl }}
          PARKKING_INPUT_EXECUTE: ${{ github.event.inputs.execute }}
          PARKKING_INPUT_DEPLOY: ${{ github.event.inputs.deploy }}
          PARKKING_INPUT_DEPLOY_MODE: ${{ github.event.inputs.deployMode }}
        run: npm run ops:render-runtime-env-sync-workflow
      - name: Summarize sync
        if: always()
        run: npm run ops:append-workflow-summary -- --append-file .tmp/render-runtime-env-sync.md
      - name: Upload sync artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-runtime-env-sync
          path: |
            .tmp/render-runtime-env-sync.md
            .tmp/render-runtime-env-sync.json
          if-no-files-found: warn
