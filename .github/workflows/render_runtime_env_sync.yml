name: Render Runtime Env Sync

on:
  workflow_dispatch:
    inputs:
      serviceId:
        description: Render service ID, for example srv-...
        required: false
      serviceName:
        description: Render service name to resolve when serviceId is omitted
        required: false
        default: parkking
      packageUrl:
        description: Optional PARKKING_RELEASE_PACKAGE_URL to sync with runtime env
        required: false
      manifestUrl:
        description: Optional PARKKING_RELEASE_MANIFEST_URL to sync with runtime env
        required: false
      execute:
        description: Actually update Render env vars; false runs a dry-run plan
        required: false
        type: boolean
        default: false
      deploy:
        description: Trigger a Render deploy after updating runtime env vars
        required: false
        type: boolean
        default: true
      deployMode:
        description: Render deploy mode
        required: false
        type: choice
        default: build_and_deploy
        options:
          - build_and_deploy
          - deploy_only

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Sync Render runtime env
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: npm run ops:render-runtime-env-sync -- --service-id "${{ inputs.serviceId }}" --service-name "${{ inputs.serviceName }}" --package-url "${{ inputs.packageUrl }}" --manifest-url "${{ inputs.manifestUrl }}" ${{ inputs.execute && '--execute' || '' }} ${{ inputs.deploy && '--deploy' || '' }} --deploy-mode "${{ inputs.deployMode }}" --out .tmp/render-runtime-env-sync.md --json-out .tmp/render-runtime-env-sync.json
      - name: Summarize sync
        if: always()
        run: npm run ops:append-workflow-summary -- --append-file .tmp/render-runtime-env-sync.md
      - name: Upload sync artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-runtime-env-sync
          path: |
            .tmp/render-runtime-env-sync.md
            .tmp/render-runtime-env-sync.json
          if-no-files-found: warn
