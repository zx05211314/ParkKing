name: Weekly Cleanup

on:
  schedule:
    - cron: '15 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Run cleanup
        run: npm run ops:workflow-cleanup -- --maxBackups 10 --maxAgeDays 30
      - name: Upload cleanup summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: weekly-cleanup-summary
          path: |
            .tmp/cleanup-summary.txt
            .tmp/cleanup.log
          if-no-files-found: warn
