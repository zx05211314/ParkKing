name: Render Live Verify

on:
  workflow_dispatch:
    inputs:
      appUrl:
        description: Live Render service URL, for example https://parkking.onrender.com
        required: true
      manifestUrl:
        description: Published release manifest URL
        required: true
      useGithubToken:
        description: Send github.token as a Bearer token for private GitHub release assets
        required: false
        type: boolean
        default: false
      skipSyncIssueRoundtrip:
        description: Skip the live sync issue-report write/read roundtrip; health and readiness probes still run
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Verify live Render deployment
        env:
          PARKKING_RENDER_APP_URL: ${{ inputs.appUrl }}
          PARKKING_RELEASE_MANIFEST_URL: ${{ inputs.manifestUrl }}
          PARKKING_RELEASE_DOWNLOAD_TOKEN: ${{ inputs.useGithubToken && github.token || '' }}
        run: npm run ops:render-deployment-verify -- ${{ inputs.skipSyncIssueRoundtrip && '--skip-sync-issue-roundtrip' || '' }}
      - name: Summarize verification
        if: always()
        run: npm run ops:append-workflow-summary -- --append-file .tmp/render-deployment-verify.md
      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: render-live-verify
          path: |
            .tmp/render-deployment-verify.md
            .tmp/render-deployment-verify.json
          if-no-files-found: warn
